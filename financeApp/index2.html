<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance App</title>

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --text: #ffffff;
      --text-secondary: #a1a1a1;
      --primary: #00ff88;
      --danger: #ff4d4d;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0f0f0f, #050505);
      color: var(--text);
      padding: 30px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: var(--radius);
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: rgba(0,255,136,0.3);
    }

    .saldo {
      font-size: 32px;
      margin-top: 10px;
      font-weight: bold;
    }

    .input {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0d0d0d;
      color: white;
      transition: 0.2s;
    }

    .input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(0,255,136,0.2);
    }

    .button {
      margin-top: 12px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(0,255,136,0.4);
    }

    .transacao {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      transition: 0.2s;
    }

    .transacao:hover {
      background: rgba(255,255,255,0.06);
    }

    .receita {
      color: var(--primary);
      font-weight: bold;
    }

    .despesa {
      color: var(--danger);
      font-weight: bold;
    }

    .categoria {
      font-size: 14px;
      color: var(--text-secondary);
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>💰 Seu Controle Financeiro</h1>

    <div class="grid">
      <div class="card">
        <h3>Saldo Atual</h3>
        <p id="saldo" class="saldo">R$ 0</p>
      </div>

      <div class="card">
        <h3>Adicionar</h3>
        <select id="tipo" class="input">
          <option value="Receita">Receita</option>
          <option value="Despesa">Despesa</option>
        </select>
        <input id="categoria" class="input" placeholder="Categoria" />
        <input id="valor" class="input" type="number" placeholder="Valor" />
        <button class="button" onclick="adicionar()">Adicionar</button>
      </div>
    </div>

    <div class="card">
      <h3>Histórico</h3>
      <div id="lista"></div>
    </div>
  </div>

  <script>
    const API = "http://localhost:5000/Finance";

    async function carregar() {
      const res = await fetch(API);
      const data = await res.json();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      data.reverse().forEach(t => {
        const div = document.createElement("div");
        div.className = "transacao";

        div.innerHTML = `
          <div>
            <div>${t.categoria}</div>
            <div class="categoria">${t.tipo}</div>
          </div>
          <span class="${t.tipo === 'Receita' ? 'receita' : 'despesa'}">
            R$ ${t.valor}
          </span>
        `;

        lista.appendChild(div);
      });

      const saldoRes = await fetch(API + "/saldo");
      const saldo = await saldoRes.json();

      document.getElementById("saldo").innerText = "R$ " + saldo;
    }

    async function adicionar() {
      const tipo = document.getElementById("tipo").value;
      const categoria = document.getElementById("categoria").value;
      const valor = parseFloat(document.getElementById("valor").value);

      await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          tipo,
          categoria,
          valor,
          data: new Date().toISOString()
        })
      });

      document.getElementById("categoria").value = "";
      document.getElementById("valor").value = "";

      carregar();
    }

    carregar();
  </script>
</body>
</html>
