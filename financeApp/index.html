<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre - Assistente Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            900: '#111827',
                            950: '#0b0f19', // Cor exata do fundo da referência
                        },
                        emerald: {
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilo básico para o Modal e Scrollbar */
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow-x: hidden; overflow-y: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-slate-200 font-sans min-h-screen">

    <header class="bg-gray-900 border-b border-gray-800">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500 p-3 rounded-2xl text-white flex items-center justify-center shadow-lg">
                    <i class="fas fa-chart-line text-xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white">Pierre</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <span class="block text-sm text-white font-medium">Olá, Usuário</span>
                    <span class="block text-xs text-slate-400">Plano Pro</span>
                </div>
                <img src="https://ui-avatars.com/api/?name=Usuario&background=10b981&color=fff&rounded=true&bold=true" alt="Avatar" class="w-12 h-12 rounded-full border-2 border-gray-700">
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-10 space-y-10">
        
        <section class="bg-gray-900 p-10 rounded-3xl shadow-xl border border-gray-800 flex flex-col md:flex-row justify-between items-center gap-8">
            <div>
                <p class="text-sm text-slate-400 uppercase tracking-widest font-bold">Saldo Total Disponível</p>
                <h2 id="saldo-atual" class="text-6xl font-extrabold mt-3 text-white tracking-tight">R$ 0,00</h2>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <button onclick="toggleModal('Receita')" class="flex-1 md:flex-none bg-gray-800 hover:bg-gray-700 text-emerald-400 px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition shadow-md border border-gray-700">
                    <i class="fas fa-arrow-down text-lg"></i> Receita
                </button>
                <button onclick="toggleModal('Despesa')" class="flex-1 md:flex-none bg-gray-800 hover:bg-gray-700 text-rose-400 px-8 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition shadow-md border border-gray-700">
                    <i class="fas fa-arrow-up text-lg"></i> Despesa
                </button>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-900 p-8 rounded-3xl shadow-xl border border-gray-800 hover:border-emerald-800 transition-all hover:-translate-y-1">
                <div class="flex items-center justify-between mb-5">
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-wider">Entradas</p>
                    <div class="bg-emerald-950 text-emerald-400 p-3 rounded-xl text-xl">
                        <i class="fas fa-circle-dollar-to-slot"></i>
                    </div>
                </div>
                <p id="total-receitas" class="text-4xl font-extrabold text-white">R$ 0,00</p>
                <p class="text-xs text-emerald-400 mt-2 font-medium">Este mês</p>
            </div>
            
            <div class="bg-gray-900 p-8 rounded-3xl shadow-xl border border-gray-800 hover:border-gray-700 transition-all hover:-translate-y-1">
                <div class="flex items-center justify-between mb-5">
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-wider">Saldo em Conta</p>
                    <div class="bg-gray-800 text-slate-200 p-3 rounded-xl text-xl">
                        <i class="fas fa-vault"></i>
                    </div>
                </div>
                <p id="total-saldo-card" class="text-4xl font-extrabold text-white">R$ 0,00</p>
                <p class="text-xs text-slate-400 mt-2 font-medium">Total acumulado</p>
            </div>

            <div class="bg-gray-900 p-8 rounded-3xl shadow-xl border border-gray-800 hover:border-rose-800 transition-all hover:-translate-y-1">
                <div class="flex items-center justify-between mb-5">
                    <p class="text-sm text-slate-400 font-bold uppercase tracking-wider">Saídas</p>
                    <div class="bg-rose-950 text-rose-400 p-3 rounded-xl text-xl">
                        <i class="fas fa-money-bill-transfer"></i>
                    </div>
                </div>
                <p id="total-despesas" class="text-4xl font-extrabold text-white">R$ 0,00</p>
                <p class="text-xs text-rose-400 mt-2 font-medium">Este mês</p>
            </div>
        </section>

        <section class="bg-gray-900 p-10 rounded-3xl shadow-xl border border-gray-800">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-extrabold text-white">Últimas Transações</h3>
                <div class="relative w-72">
                    <input type="text" placeholder="Buscar categoria ou valor..." class="w-full bg-gray-800 px-5 py-3 pl-12 rounded-xl border border-gray-700 text-sm text-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
                    <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="text-xs text-slate-400 uppercase tracking-wider border-b border-gray-800">
                        <tr>
                            <th class="px-6 py-4">Data</th>
                            <th class="px-6 py-4">Categoria</th>
                            <th class="px-6 py-4">Tipo</th>
                            <th class="px-6 py-4 text-right">Valor (R$)</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-gray-800/50">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="text-center py-10 text-slate-600 text-sm border-t border-gray-900 mt-10">
        Pierre &copy; 2026 - O seu Assistente Financeiro Inteligente.
    </footer>

    <button onclick="toggleModal('Receita')" class="fixed bottom-8 right-8 bg-emerald-500 hover:bg-emerald-600 text-white w-16 h-16 rounded-full rounded-br-lg flex items-center justify-center shadow-2xl transition-all hover:scale-110 active:scale-95 z-40 border-4 border-gray-950">
        <i class="fas fa-plus text-2xl"></i>
    </button>

    <div id="modal-nova-transacao" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 overflow-y-auto">
        <div onclick="toggleModal()" class="modal-overlay absolute w-full h-full bg-gray-950/80 backdrop-blur-sm"></div>
        
        <div class="modal-container bg-gray-900 w-11/12 md:max-w-xl mx-auto rounded-3xl shadow-2xl z-50 border border-gray-800 my-10">
            
            <div class="modal-content py-8 px-10">
                <div class="flex justify-between items-center pb-6 border-b border-gray-800 mb-8">
                    <p id="modal-titulo" class="text-3xl font-extrabold text-white">Nova Transação</p>
                    <button onclick="toggleModal()" class="modal-close cursor-pointer text-slate-500 hover:text-rose-500 transition">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <form id="form-transacao" class="space-y-6">
                    <input type="hidden" id="transacao-tipo" name="tipo">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-300 mb-2 tracking-wide">Data da Transação</label>
                            <input type="date" id="transacao-data" required class="w-full bg-gray-800 px-5 py-3.5 rounded-xl border border-gray-700 text-slate-100 focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-300 mb-2 tracking-wide">Categoria (ex: Salário, Aluguel)</label>
                            <input type="text" id="transacao-categoria" placeholder="Digite a categoria" required class="w-full bg-gray-800 px-5 py-3.5 rounded-xl border border-gray-700 text-slate-100 focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-slate-300 mb-2 tracking-wide">Valor da Transação (R$)</label>
                        <input type="number" step="0.01" id="transacao-valor" placeholder="0,00" required class="w-full bg-gray-800 px-5 py-5 rounded-xl border border-gray-700 text-emerald-400 focus:ring-2 focus:ring-emerald-500 outline-none text-4xl font-extrabold tracking-tight">
                    </div>

                    <div class="flex justify-end pt-8 gap-4 border-t border-gray-800 mt-10">
                        <button type="button" onclick="toggleModal()" class="px-8 py-3.5 bg-gray-800 hover:bg-gray-700 text-slate-300 rounded-xl font-bold transition">Cancelar</button>
                        <button type="submit" id="btn-salvar" class="px-8 py-3.5 rounded-xl text-white font-extrabold transition shadow-lg hover:-translate-y-0.5">Salvar Transação</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
