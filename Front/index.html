<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanças APP - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Hanken+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#e5e2e1", "on-primary": "#293500", "surface-container": "#201f1f", "on-tertiary": "#313030",
              "surface-dim": "#131313", "on-primary-container": "#576c00", "surface-container-lowest": "#0e0e0e", "surface-tint": "#add500",
              "tertiary": "#ffffff", "on-secondary-fixed-variant": "#6900b3", "inverse-on-surface": "#313030", "on-primary-fixed": "#171e00",
              "tertiary-fixed-dim": "#c8c6c5", "secondary": "#ddb7ff", "on-primary-fixed-variant": "#3d4d00", "on-surface": "#e5e2e1",
              "on-tertiary-fixed": "#1c1b1b", "error": "#ffb4ab", "primary-container": "#c6f311", "surface-bright": "#3a3939",
              "on-background": "#e5e2e1", "inverse-primary": "#516600", "secondary-fixed-dim": "#ddb7ff", "inverse-surface": "#e5e2e1",

            fontFamily: {
              "headline-md": ["Hanken Grotesk"], "label-sm": ["Geist"], "body-md": ["Manrope"], "body-lg": ["Manrope"],
              "headline-lg-mobile": ["Hanken Grotesk"], "headline-lg": ["Hanken Grotesk"]
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #353534; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #474746; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
